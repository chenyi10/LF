# Default configuration for Leader-Follower Multi-Hypothesis Navigation

# Environment settings
env:
  n_agents: 5  # 1 Leader + 4 Followers
  max_steps: 500
  dt: 0.1  # Time step
  
  # World boundaries
  world_size: 20.0
  
  # Agent physics
  agent_radius: 0.3
  v_max: 2.0
  a_max: 1.0
  
  # Goal settings
  goal_radius: 1.0
  success_reward: 100.0
  collision_penalty: -50.0
  
  # Initial spawn area
  spawn_radius: 2.0

# Sensor settings
sensors:
  # Long-range rays for leader (multi-view)
  n_rays_leader: 16
  ray_length_leader: 10.0
  
  # Short-range rays for followers (local obstacle detection)
  n_rays_follower: 8
  ray_length_follower: 4.0
  
  # Avoid rays (for all agents' obstacle avoidance)
  n_rays_avoid: 8
  d_max_avoid: 3.0

# Obstacle avoidance settings
obstacle_avoidance:
  d_safe: 1.0  # Safety distance threshold
  k_avoid: 0.15  # Repulsion strength
  a_avoid_max: 0.5  # Max avoidance action norm
  
  # Velocity projection (anti-penetration)
  d_proj: 0.8  # Distance threshold for velocity projection
  enabled: true

# Formation control settings
formation:
  k_p: 0.5  # Position gain
  k_d: 0.3  # Velocity damping
  a_form_max: 0.4  # Max formation action norm
  
  # Formation offsets relative to leader (for followers)
  # Format: [dx, dy] for each follower
  offsets:
    - [-1.5, 0.0]   # Follower 0: behind leader
    - [-1.5, -1.0]  # Follower 1: behind-left
    - [-1.5, 1.0]   # Follower 2: behind-right
    - [-2.5, 0.0]   # Follower 3: further behind

# Leader network settings
leader:
  n_hypotheses: 3  # Number of guidance directions (K)
  guidance_selection: "sample"  # "sample" or "argmax"
  k_guidance: 0.3  # Guidance following strength (for stage 1)
  
  # MHA settings
  use_mha: true
  n_heads: 4
  d_model: 128
  d_feedforward: 256
  dropout: 0.1
  
  # Input encoding
  ray_encoding_dim: 32
  goal_encoding_dim: 32
  summary_encoding_dim: 32

# Follower network settings
follower:
  hidden_dims: [128, 128]
  use_layer_norm: true

# Reward shaping
reward:
  progress_scale: 1.0
  collision_penalty: -50.0
  success_reward: 100.0
  boundary_penalty: -50.0
  
  # Optional: guidance smoothness penalty for leader
  guidance_smooth_weight: 0.01
  guidance_smooth_enabled: false

# Training settings
training:
  # Stage 1: Train leader
  stage1:
    total_timesteps: 500000
    n_envs: 8
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
  
  # Stage 2: Train follower
  stage2:
    total_timesteps: 500000
    n_envs: 8
    learning_rate: 0.0003
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5

# Obstacles (corridor, corners, forks)
obstacles:
  - type: "wall"
    start: [5.0, -5.0]
    end: [5.0, 0.0]
  - type: "wall"
    start: [5.0, 2.0]
    end: [5.0, 7.0]
  - type: "wall"
    start: [-3.0, 3.0]
    end: [2.0, 3.0]
  - type: "wall"
    start: [-3.0, -3.0]
    end: [2.0, -3.0]
  # Fork
  - type: "wall"
    start: [8.0, -2.0]
    end: [10.0, -2.0]
  - type: "wall"
    start: [8.0, 2.0]
    end: [10.0, 2.0]

# Evaluation settings
evaluation:
  n_episodes: 50
  render: false
  save_trajectories: true
  output_dir: "results"

# Random seed
seed: 42
